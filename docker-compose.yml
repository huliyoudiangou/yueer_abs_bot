services:
  abs_bot:
    build: .
    container_name: abs_tg_bot
    restart: unless-stopped

    ports:
        - "28097:28097"
    
    volumes:
      - ./data:/app/data:rw
      - ./.env:/app/.env:ro

    environment:
      - TZ=Asia/Shanghai

    read_only: true
    tmpfs:
      - /tmp

    security_opt:
      - no-new-privileges:true

    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID

    mem_limit: 512m
    cpus: "1.0"

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
